experiment_name: btcusdt_ppo_smoke
env_config:
  data_path: data/features/binance/BTCUSDT_1h_features.parquet
  initial_cash: 10000.0
  lookback: 64
  episode_length: 2048
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_trade_notional: 10.0
training:
  stop_iterations: 10
  checkpoint_frequency: 5
  num_env_runners: 1
  train_batch_size: 4096
  lr: 0.0001
