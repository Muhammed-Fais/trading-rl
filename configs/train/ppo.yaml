experiment_name: btcusdt_ppo_smoke
tracking:
  uri: sqlite:///mlflow.db
  experiment: trading-rl
env_config:
  data_path: data/features/binance/BTCUSDT_1h_features.parquet
  initial_cash: 10000.0
  lookback: 64
  episode_length: 2048
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_trade_notional: 10.0
  reward:
    return_weight: 1.0
    benchmark_weight: 0.25
    drawdown_penalty: 0.2
    downside_penalty: 0.1
    volatility_penalty: 0.02
    turnover_penalty: 0.002
    exposure_penalty: 0.001
    max_position_fraction: 1.0
    reward_clip: 0.05
    rolling_window: 32
training:
  stop_iterations: 5
  checkpoint_frequency: 5
  num_env_runners: 1
  train_batch_size: 4096
  lr: 0.0001
report:
  enabled: true
  output: artifacts/reports/btcusdt_ppo_smoke.html
  seed: 7
