symbols:
  BTCUSDT:
    data_path: data/features/binance/BTCUSDT_1h_features.parquet
  ETHUSDT:
    data_path: data/features/binance/ETHUSDT_1h_features.parquet
  BNBUSDT:
    data_path: data/features/binance/BNBUSDT_1h_features.parquet
  SOLUSDT:
    data_path: data/features/binance/SOLUSDT_1h_features.parquet
  XRPUSDT:
    data_path: data/features/binance/XRPUSDT_1h_features.parquet

base_env_config:
  initial_cash: 10000.0
  lookback: 64
  episode_length: null
  split: all
  random_start: false
  train_fraction: 0.7
  validation_fraction: 0.15
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_trade_notional: 10.0
  action_mode: continuous
  no_trade_band: 0.05
  normalize_observations: true
  observation_clip: 10.0

holdout:
  start: "2024-01-01"
  end: "2024-12-31"

policies:
  cash:
    kind: named
    name: cash
  buy_and_hold:
    kind: named
    name: buy_and_hold
  trend_risk_crypto5_best:
    kind: trend_risk
    params:
      short_window: 24
      long_window: 336
      realized_window: 120
      target_hourly_vol: 0.008
      max_portfolio_drawdown: 0.12
      trailing_stop: 0.15
      trailing_stop_mode: percent
      cooldown_steps: 48
      max_exposure: 1.0
