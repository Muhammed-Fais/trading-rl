symbols:
  BTCUSDT:
    data_path: data/features/binance/BTCUSDT_1h_features.parquet
  ETHUSDT:
    data_path: data/features/binance/ETHUSDT_1h_features.parquet
base_env_config:
  initial_cash: 10000.0
  lookback: 64
  episode_length: null
  split: all
  random_start: false
  train_fraction: 0.7
  validation_fraction: 0.15
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_trade_notional: 10.0
  action_mode: continuous
  no_trade_band: 0.05
  target_position_fractions: [0.0, 0.25, 0.5, 0.75, 1.0]
  normalize_observations: true
  observation_clip: 10.0
  reward:
    return_weight: 1.0
    benchmark_weight: 0.25
    drawdown_penalty: 0.2
    downside_penalty: 0.1
    volatility_penalty: 0.02
    turnover_penalty: 0.02
    exposure_penalty: 0.001
    max_position_fraction: 1.0
    reward_clip: 0.05
    rolling_window: 32
policies:
  - cash
  - buy_and_hold
  - trend
  - vol_target
  - trend_risk
  - trend_risk_fast
  - trend_risk_slow
  - trend_risk_defensive
walk_forward:
  train_size: 8760
  test_size: 2160
  step_size: 2160
