symbols:
  BTCUSDT:
    data_path: data/features/binance/BTCUSDT_1h_features.parquet
  ETHUSDT:
    data_path: data/features/binance/ETHUSDT_1h_features.parquet

base_env_config:
  initial_cash: 10000.0
  lookback: 64
  episode_length: null
  split: all
  random_start: false
  train_fraction: 0.7
  validation_fraction: 0.15
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_trade_notional: 10.0
  action_mode: continuous
  no_trade_band: 0.05
  normalize_observations: true
  observation_clip: 10.0

walk_forward:
  train_size: 8760
  test_size: 2160
  step_size: 2160

grid:
  short_window: [24, 48]
  long_window: [168, 336]
  realized_window: [72, 120]
  target_hourly_vol: [0.006, 0.008]
  max_portfolio_drawdown: [0.12]
  trailing_stop: [0.15]
  cooldown_steps: [48]
  max_exposure: [1.0]
